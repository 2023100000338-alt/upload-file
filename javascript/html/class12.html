<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="username">username:</label>
        <input type="text" id="username" minlength="6" maxlength="15" required><br>
        <label for="password">password:</label>
        <input type="password" id="password" minlength="4" maxlength="12" required><br>
        <label for="email">email:</label>
        
        <input type="email" minlength="4" maxlength="50" required><br>
        <label for="phone">phone</label>
        <input type="phone" id="phone" placeholder="01345..." pattern="[0-9]{3}"><br>
        <label for="date">Date:</label>
        <input type="date" id="data"><br> 
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" min="0 " max="99" value="1"><br>
        <label for="title">Title:</label>
        <label for="Mr.">Mr.</label>
        <input type="radio" id="Mr." value="Mr." name="title">
        <label for="Ms.">Ms.</label>
        <input type="radio" id="Ms." value="Ms." name="title"><br>
        <label for="payment">Payment</label>
        <select id="payment">
            <option value="visa">Visa</option>
            <option value="baksh">baksh</option>
        </select><br>
        <label for="subscribe">subscribe:</label>
        <input type="checkbox" id="subscribe"><br>
        <label for="comment">comment</label>
       <textarea id="comment" rows="4" cols="25"></textarea><br>
       <lable for="file">File:</lable>
      <input type="file" id="file" accept="image/png,image/jpg"><br>
       
        
        <input type="reset"><br>
        <input type="submit">
    </form>
</body>
</html>
